name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile scripts
        run: python -m py_compile sbom-vm.py generate-test-images.py
      - name: Run unit tests
        run: python -m unittest discover -s tests
